name: Test

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Verify test script exists
        run: |
          if [ ! -f "test.sh" ]; then
            echo "::error::test.sh not found"
            exit 1
          fi
      
      - name: Run test suite
        id: test
        run: |
          chmod +x test.sh
          ./test.sh
      
      - name: Report test results
        if: always()
        run: |
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "✅ All tests passed"
          else
            echo "❌ Tests failed"
            exit 1
          fi
